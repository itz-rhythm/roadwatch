services:
  # 1. Frontend Static Site
  - type: static
    name: roadwatch-frontend
    buildCommand: npm run build
    staticPublishPath: dist
    baseDir: roadwatch-main/frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: roadwatch-backend
          type: web
          property: host

  # 2. Backend Express API
  - type: web
    name: roadwatch-backend
    runtime: node
    buildCommand: npm install --legacy-peer-deps
    startCommand: node server.js
    baseDir: roadwatch-main/backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roadwatch-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

  # 3. ML Intelligence Service (FastAPI)
  - type: web
    name: roadwatch-ml-service
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    baseDir: roadwatch-main/ml-service
    envVars:
      - key: PORT
        value: 8000

databases:
  # Managed PostgreSQL Database
  - name: roadwatch-db
    databaseName: roadwatch
    user: postgres
    plan: free
